
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Protección de Datos</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; }
.question { margin-bottom: 20px; }
button { margin-top: 20px; padding: 10px 15px; }
.result { font-weight: bold; margin-top: 20px; }
</style>
</head>
<body>

<h1>Quiz: Introducción a la Protección de Datos</h1>

<form id="quizForm">

<div class="question">
<p>1. ¿Qué es un dato personal?</p>
<label><input type="radio" name="q1" value="A"> A) Información sobre objetos</label><br>
<label><input type="radio" name="q1" value="B"> B) Información que identifica o puede identificar a una persona</label><br>
<label><input type="radio" name="q1" value="C"> C) Solo datos financieros</label><br>
<label><input type="radio" name="q1" value="D"> D) Información pública sin restricciones</label>
</div>

<div class="question">
<p>2. ¿Cuál es un dato sensible?</p>
<label><input type="radio" name="q2" value="A"> A) Nombre</label><br>
<label><input type="radio" name="q2" value="B"> B) Correo electrónico</label><br>
<label><input type="radio" name="q2" value="C"> C) Estado de salud</label><br>
<label><input type="radio" name="q2" value="D"> D) Teléfono</label>
</div>

<div class="question">
<p>3. ¿Qué significa confidencialidad?</p>
<label><input type="radio" name="q3" value="A"> A) Compartir datos libremente</label><br>
<label><input type="radio" name="q3" value="B"> B) Proteger los datos de accesos no autorizados</label><br>
<label><input type="radio" name="q3" value="C"> C) Eliminar todos los datos</label><br>
<label><input type="radio" name="q3" value="D"> D) Publicar información</label>
</div>

<div class="question">
<p>4. ¿Qué es el consentimiento?</p>
<label><input type="radio" name="q4" value="A"> A) Obligación legal</label><br>
<label><input type="radio" name="q4" value="B"> B) Autorización libre e informada</label><br>
<label><input type="radio" name="q4" value="C"> C) Contrato comercial</label><br>
<label><input type="radio" name="q4" value="D"> D) Recomendación</label>
</div>

<div class="question">
<p>5. ¿Qué es una brecha de seguridad?</p>
<label><input type="radio" name="q5" value="A"> A) Mejora del sistema</label><br>
<label><input type="radio" name="q5" value="B"> B) Acceso no autorizado a datos</label><br>
<label><input type="radio" name="q5" value="C"> C) Copia de seguridad</label><br>
<label><input type="radio" name="q5" value="D"> D) Cambio de contraseña</label>
</div>

<div class="question">
<p>6. ¿Buena práctica de seguridad?</p>
<label><input type="radio" name="q6" value="A"> A) Contraseñas débiles</label><br>
<label><input type="radio" name="q6" value="B"> B) Compartir datos públicamente</label><br>
<label><input type="radio" name="q6" value="C"> C) Contraseñas seguras</label><br>
<label><input type="radio" name="q6" value="D"> D) No actualizar sistemas</label>
</div>

<button type="button" onclick="checkAnswers()">Ver resultados</button>

</form>

<div class="result" id="result"></div>

<script>
function checkAnswers() {
    let answers = {
        q1: "B",
        q2: "C",
        q3: "B",
        q4: "B",
        q5: "B",
        q6: "C"
    };

    let score = 0;
    for (let q in answers) {
        let selected = document.querySelector('input[name="'+q+'"]:checked');
        if (selected && selected.value === answers[q]) {
            score++;
        }
    }

    document.getElementById("result").innerHTML = "Tu puntaje: " + score + "/6";
}
</script>

</body>
</html>
